name: Build gfx11 CI image

on:
  workflow_dispatch:
    inputs:
      rocm_nightly_index:
        description: 'ROCm nightly wheel index URL'
        default: 'https://rocm.nightlies.amd.com/v2/gfx1151'
        required: false
      pytorch_version:
        description: 'PyTorch version to pre-install'
        default: '2.10.0'
        required: false
  push:
    branches: [gfx11]
    paths:
      - 'docker/Dockerfile.gfx11-ci'
      - '.github/workflows/build-gfx11-ci-image.yml'
  schedule:
    - cron: '0 6 * * 1'  # Weekly Monday 6am UTC
  pull_request:
    branches: [gfx11]
    paths:
      - 'docker/Dockerfile.gfx11-ci'
      - '.github/workflows/build-gfx11-ci-image.yml'

env:
  REGISTRY: ghcr.io
  # github.repository may contain uppercase (e.g. ROCm/vllm); Docker requires lowercase tags.
  IMAGE_NAME: rocm/vllm/gfx11-ci

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.gfx11-ci
          # Only push on schedule or manual trigger (not on PRs)
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            ROCM_NIGHTLY_INDEX=${{ github.event.inputs.rocm_nightly_index || 'https://rocm.nightlies.amd.com/v2/gfx1151' }}
            PYTORCH_VERSION=${{ github.event.inputs.pytorch_version || '2.10.0' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
