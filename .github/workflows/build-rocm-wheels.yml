name: Build ROCm Wheels

on:
  push:
    tags:
      - 'v*'
    branches:
      - main
      - 'matthias.awq_gemv'
      - 'release/*'
  workflow_dispatch:
    inputs:
      pytorch_index:
        description: 'PyTorch index URL for ROCm nightly wheels'
        default: 'https://rocm.nightlies.amd.com/v2-staging/gfx1151'
        required: false
      rocm_arch:
        description: 'ROCm architecture (e.g., gfx1151, gfx1150;gfx1151)'
        default: 'gfx1150;gfx1151;gfx1152;gfx1153'
        required: false

env:
  PYTORCH_INDEX_URL: ${{ github.event.inputs.pytorch_index || 'https://rocm.nightlies.amd.com/v2-staging/gfx1151' }}
  PYTORCH_ROCM_ARCH: ${{ github.event.inputs.rocm_arch || 'gfx1150;gfx1151;gfx1152;gfx1153' }}

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for setuptools-scm versioning
          fetch-tags: true

      - name: Fetch upstream tags for versioning
        run: |
          git remote add upstream https://github.com/vllm-project/vllm.git || true
          git fetch upstream --tags
          echo "Git describe: $(git describe --tags --always)"

      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false      # Keep tool cache for Python setup
          android: true          # ~12GB
          dotnet: true           # ~6GB
          haskell: true          # ~5GB
          large-packages: true   # ~5GB
          docker-images: true    # ~3GB
          swap-storage: true     # ~4GB

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-rocm-${{ runner.os }}-${{ hashFiles('requirements/*.txt') }}
          restore-keys: |
            pip-rocm-${{ runner.os }}-

      - name: Install and configure sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build wheel setuptools setuptools-scm ninja cmake packaging jinja2

      - name: Install PyTorch, ROCm SDK and build deps
        run: |
          # Install from rocm-build.txt (pins torch==2.10.0 etc.)
          # Use nightly index instead of the default ROCm test index in the file
          pip install -r requirements/rocm-build.txt \
            --extra-index-url ${{ env.PYTORCH_INDEX_URL }}
          
          # Install ROCm SDK with devel and libraries extras
          pip install "rocm[devel,libraries]" --extra-index-url ${{ env.PYTORCH_INDEX_URL }} || \
            echo "Warning: Could not install rocm[devel,libraries]"
          
          # Initialize ROCm SDK (creates symlinks, etc.)
          rocm-sdk init || echo "Warning: rocm-sdk init failed"
          
          # Show what's installed
          pip list | grep -i -E "rocm|torch|sdk" || true
          python -c "import torch; print(f'PyTorch version: {torch.__version__}'); print(f'HIP: {torch.version.hip}'); print(f'CUDA: {torch.version.cuda}')"

      - name: Configure ROCm environment
        id: rocm-env
        run: |
          # Get site-packages path
          SITE_PACKAGES=$(python -c "import site; print(site.getsitepackages()[0])")
          echo "SITE_PACKAGES=$SITE_PACKAGES"
          
          # List what ROCm packages are installed
          echo "=== ROCm packages in site-packages ==="
          ls -la "$SITE_PACKAGES" | grep -i rocm || true
          ls -la "$SITE_PACKAGES/_rocm"* 2>/dev/null || true
          
          # Set ROCm paths based on AMD nightly wheel structure
          ROCM_PATH="$SITE_PACKAGES/_rocm_sdk_devel"
          HIP_DEVICE_LIB_PATH="$SITE_PACKAGES/_rocm_sdk_core/lib/llvm/amdgcn/bitcode"
          ROCM_BIN="$ROCM_PATH/bin"
          
          echo "=== ROCM_PATH contents ==="
          ls -la "$ROCM_PATH" 2>/dev/null || echo "Warning: ROCM_PATH not found"
          ls -la "$ROCM_PATH/bin" 2>/dev/null || echo "Warning: ROCM_PATH/bin not found"
          ls -la "$ROCM_PATH/lib/llvm/bin" 2>/dev/null || echo "Warning: ROCM_PATH/lib/llvm/bin not found"
          
          echo "=== HIP_DEVICE_LIB_PATH contents ==="
          ls -la "$HIP_DEVICE_LIB_PATH" 2>/dev/null | head -20 || echo "Warning: HIP_DEVICE_LIB_PATH not found"
          
          # Export to GITHUB_ENV for subsequent steps
          echo "ROCM_PATH=$ROCM_PATH" >> $GITHUB_ENV
          echo "HIP_DEVICE_LIB_PATH=$HIP_DEVICE_LIB_PATH" >> $GITHUB_ENV
          echo "PATH=$ROCM_BIN:$PATH" >> $GITHUB_ENV
          
          # Verify hipcc is available
          echo "=== Checking hipcc ==="
          which hipcc || echo "hipcc not found in PATH"
          cat $(which hipcc) 2>/dev/null | head -50 || true

      - name: Install remaining vLLM build requirements
        run: |
          # build.txt has additional deps not in rocm-build.txt (e.g. grpcio-tools)
          pip install -r requirements/build.txt --extra-index-url ${{ env.PYTORCH_INDEX_URL }}

      - name: Build wheel
        env:
          PYTORCH_ROCM_ARCH: ${{ env.PYTORCH_ROCM_ARCH }}
          VLLM_TARGET_DEVICE: rocm
          MAX_JOBS: 4
          # Enable sccache for faster rebuilds
          SCCACHE_GHA_ENABLED: "true"
          CMAKE_C_COMPILER_LAUNCHER: sccache
          CMAKE_CXX_COMPILER_LAUNCHER: sccache
          CMAKE_HIP_COMPILER_LAUNCHER: sccache
        run: |
          echo "=== Environment ==="
          echo "ROCM_PATH=$ROCM_PATH"
          echo "PYTORCH_ROCM_ARCH=$PYTORCH_ROCM_ARCH"
          echo "VLLM_TARGET_DEVICE=$VLLM_TARGET_DEVICE"
          echo "sccache stats before build:"
          sccache --show-stats || true
          echo ""
          echo "=== Building wheel ==="
          python setup.py bdist_wheel --dist-dir=dist
          echo ""
          echo "sccache stats after build:"
          sccache --show-stats || true
          ls -la dist/

      - name: Rename wheel for manylinux compliance
        run: |
          cd dist
          for wheel in *.whl; do
            if [[ "$wheel" == *"linux"* ]]; then
              new_name="${wheel/linux/manylinux_2_31}"
              mv "$wheel" "$new_name"
              echo "Renamed $wheel to $new_name"
            fi
          done
          ls -la

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: vllm-rocm-wheel
          path: dist/*.whl
          retention-days: 90

      - name: Generate wheel index
        run: |
          python scripts/generate-wheel-index.py \
            --wheels-dir dist \
            --output-dir gh-pages \
            --base-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/wheels"

      - name: Upload index artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheel-index
          path: gh-pages/
          retention-days: 90

  create-release:
    needs: build-wheel
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_tag: ${{ steps.create-tag.outputs.tag }}
    
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: vllm-rocm-wheel
          path: dist/

      - name: Determine release tag
        id: create-tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${{ github.ref_name }}"
          else
            WHEEL=$(ls dist/*.whl | head -1)
            BASENAME=$(basename "$WHEEL" .whl)
            # Extract version from wheel name: vllm-<version>-cp312-...
            VERSION=$(echo "$BASENAME" | sed 's/^vllm-//; s/-cp[0-9].*//')
            TAG="rocm-${VERSION}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Release tag: $TAG"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.create-tag.outputs.tag }}
          target_commitish: ${{ github.sha }}
          files: dist/*.whl
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
          body: |
            ## vLLM ROCm Wheel
            
            Built for ROCm architectures: `${{ env.PYTORCH_ROCM_ARCH }}`
            
            ### Installation
            ```bash
            pip install torch --extra-index-url https://rocm.nightlies.amd.com/v2-staging/gfx1151
            pip install vllm --extra-index-url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/wheels
            ```

  publish-to-gh-pages:
    needs: create-release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    
    steps:
      - name: Download wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: vllm-rocm-wheel
          path: new-wheels/

      - name: Generate index pointing to GitHub Releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          BASE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/wheels"
          RELEASE_TAG: ${{ needs.create-release.outputs.release_tag }}
        run: |
          pip install packaging

          cat > /tmp/generate_index.py << 'PYEOF'
          import os, json, subprocess
          from pathlib import Path
          from datetime import datetime
          from urllib.parse import quote

          REPO = os.environ["REPO"]
          BASE_URL = os.environ["BASE_URL"]
          RELEASE_TAG = os.environ.get("RELEASE_TAG", "latest")

          PACKAGE_INDEX_TEMPLATE = """<!DOCTYPE html>
          <html>
            <head><meta name="pypi:repository-version" content="1.0"><title>{package_name}</title></head>
            <body>
          {items}
            </body>
          </html>
          """

          def parse_wheel_name(filename):
              base = filename.removesuffix(".whl")
              parts = base.split("-")
              for i, part in enumerate(parts):
                  if part[0].isdigit():
                      return "-".join(parts[:i]).replace("_", "-")
              return parts[0].replace("_", "-")

          # Collect wheels from all GitHub Releases
          result = subprocess.run(
              ["gh", "release", "list", "--repo", REPO, "--limit", "100", "--json", "tagName"],
              capture_output=True, text=True
          )
          releases = json.loads(result.stdout) if result.returncode == 0 else []
          print(f"Found {len(releases)} releases")

          wheels = {}  # pkg_name -> [(whl_name, download_url)]
          for rel in releases:
              tag = rel["tagName"]
              result = subprocess.run(
                  ["gh", "release", "view", tag, "--repo", REPO, "--json", "assets"],
                  capture_output=True, text=True
              )
              if result.returncode != 0:
                  continue
              assets = json.loads(result.stdout).get("assets", [])
              for asset in assets:
                  name = asset["name"]
                  url = asset["url"]
                  if name.endswith(".whl"):
                      pkg = parse_wheel_name(name)
                      wheels.setdefault(pkg, []).append((name, url))

          # Include new wheels from this build if not already found in releases
          new_dir = Path("new-wheels")
          if new_dir.exists():
              for whl in new_dir.glob("*.whl"):
                  pkg = parse_wheel_name(whl.name)
                  release_names = {w[0] for w in wheels.get(pkg, [])}
                  if whl.name not in release_names:
                      url = f"https://github.com/{REPO}/releases/download/{quote(RELEASE_TAG, safe='')}/{quote(whl.name, safe='')}"
                      wheels.setdefault(pkg, []).append((whl.name, url))

          print(f"Total: {sum(len(v) for v in wheels.values())} wheels in {len(wheels)} packages")

          out = Path("gh-pages/wheels")
          out.mkdir(parents=True, exist_ok=True)

          for pkg_name, whl_list in wheels.items():
              pkg_dir = out / pkg_name
              pkg_dir.mkdir(exist_ok=True)
              links = []
              for whl_name, url in sorted(whl_list, key=lambda x: x[0], reverse=True):
                  links.append(f'    <a href="{url}">{whl_name}</a><br/>')
              (pkg_dir / "index.html").write_text(
                  PACKAGE_INDEX_TEMPLATE.format(package_name=pkg_name, items="\n".join(links))
              )

          top_index = f"""<!DOCTYPE html>
          <html>
            <head><meta name="pypi:repository-version" content="1.0"><title>ROCm Wheels</title></head>
            <body>
              <h1>ROCm Wheels</h1>
              <p>Pre-built wheels for AMD ROCm (gfx11 / Strix Halo / RDNA3+)</p>
              <p><em>Generated: {datetime.now().isoformat()}</em></p>
              <h2>Installation</h2>
              <pre>pip install torch --extra-index-url https://rocm.nightlies.amd.com/v2-staging/gfx1151
          pip install vllm --extra-index-url {BASE_URL}</pre>
              <h2>Available Packages</h2>
          """
          for p in sorted(wheels):
              top_index += f'    <a href="{p}/">{p}</a><br/>\n'
          top_index += "  </body>\n</html>"
          (out / "index.html").write_text(top_index)
          print("Index generated successfully")
          PYEOF

          python /tmp/generate_index.py

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./gh-pages/wheels
          destination_dir: wheels
          keep_files: false
